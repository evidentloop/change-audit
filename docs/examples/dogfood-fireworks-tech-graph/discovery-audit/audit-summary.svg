<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760"
     role="img" aria-labelledby="title description" data-quality-profile="showcase">
  <title id="title">Fireworks 校验链路与 EvidentLoop 审计发现</title>
  <desc id="description">EvidentLoop 独立审查 Fireworks 提交 3bfaf93，发现图例推断、弧线采样和 skew transform 三个问题；图中按被审提交展示问题链路，底部补充后续复核状态。</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", sans-serif; }
    .title { fill: #111827; font-size: 28px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 14px; }
    .group-title { fill: #1d4ed8; font-size: 14px; font-weight: 700; }
    .node-title { fill: #111827; font-size: 14px; font-weight: 700; text-anchor: middle; }
    .node-note { fill: #6b7280; font-size: 12px; text-anchor: middle; }
    .finding-title { fill: #991b1b; font-size: 15px; font-weight: 700; }
    .card-note { fill: #4b5563; font-size: 12px; }
    .legend { fill: #4b5563; font-size: 12px; }
  </style>

  <rect data-graph-role="background" width="1200" height="760" fill="#ffffff"/>
  <text class="title" x="40" y="48">Fireworks 校验链路与审计发现</text>
  <text class="subtitle" x="40" y="76">EvidentLoop 独立审查 3bfaf93 · 21 files · +842/-281 · 3 findings</text>

  <rect id="validation-core" data-graph-role="container" x="20" y="105" width="1160" height="405"
        rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text data-graph-role="label" data-graph-bounds="44,122,300,144" class="group-title" x="44" y="140">被审提交的 SVG 校验链路</text>

  <path id="svg-to-shell" data-graph-role="edge" data-edge-id="svg-to-shell"
        data-source="svg" data-target="shell" d="M 200 253 H 240"
        fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path id="shell-to-transform" data-graph-role="edge" data-edge-id="shell-to-transform"
        data-source="shell" data-target="transform" d="M 400 239 H 425 V 195 H 455"
        fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path id="shell-to-routes" data-graph-role="edge" data-edge-id="shell-to-routes"
        data-source="shell" data-target="routes" d="M 400 267 H 439 V 345 H 455"
        fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path id="transform-to-gates" data-graph-role="edge" data-edge-id="transform-to-gates"
        data-source="transform" data-target="gates" d="M 685 195 H 715 V 235 H 750"
        fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path id="routes-to-gates" data-graph-role="edge" data-edge-id="routes-to-gates"
        data-source="routes" data-target="gates" d="M 685 345 H 715 V 271 H 750"
        fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path id="gates-to-result" data-graph-role="edge" data-edge-id="gates-to-result"
        data-source="gates" data-target="result" d="M 960 253 H 1000"
        fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <g id="svg" data-graph-role="node" data-node-id="svg" data-graph-bounds="60,215,200,291">
    <rect x="60" y="215" width="140" height="76" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
    <text class="node-title" x="130" y="246">SVG 输入</text>
    <text class="node-note" x="130" y="268">template / authored</text>
  </g>
  <g id="shell" data-graph-role="node" data-node-id="shell" data-graph-bounds="240,215,400,291">
    <rect x="240" y="215" width="160" height="76" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text class="node-title" x="320" y="246">validate-svg.sh</text>
    <text class="node-note" x="320" y="268">分派校验门禁</text>
  </g>
  <g id="transform" data-graph-role="node" data-node-id="transform" data-graph-bounds="455,150,685,240">
    <rect x="455" y="150" width="230" height="90" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text class="node-title" x="570" y="181">walk() + role inference</text>
    <text class="node-note" x="570" y="204">F001 · 普通节点可能被排除</text>
    <text x="570" y="225" fill="#b91c1c" font-size="12" font-weight="700" text-anchor="middle">audit finding · medium</text>
  </g>
  <g id="routes" data-graph-role="node" data-node-id="routes" data-graph-bounds="455,300,685,390">
    <rect x="455" y="300" width="230" height="90" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text class="node-title" x="570" y="331">path_points() + parse_transform()</text>
    <text class="node-note" x="570" y="354">F002 · arcs → chord</text>
    <text x="570" y="375" fill="#b91c1c" font-size="12" font-weight="700" text-anchor="middle">F003 · skewX/Y → identity</text>
  </g>
  <g id="gates" data-graph-role="node" data-node-id="gates" data-graph-bounds="750,215,960,291">
    <rect x="750" y="215" width="210" height="76" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
    <text class="node-title" x="855" y="243">几何门禁</text>
    <text class="node-note" x="855" y="264">collision · geometry</text>
    <text class="node-note" x="855" y="281">composition</text>
  </g>
  <g id="result" data-graph-role="node" data-node-id="result" data-graph-bounds="1000,215,1150,291">
    <rect x="1000" y="215" width="150" height="76" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
    <text class="node-title" x="1075" y="246">校验结果</text>
    <text class="node-note" x="1075" y="268">exit · details · tests</text>
  </g>

  <g data-graph-role="decoration">
    <line x1="60" y1="470" x2="94" y2="470" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text class="legend" x="106" y="474">校验链路</text>
    <rect x="210" y="461" width="18" height="18" rx="4" fill="#fef2f2" stroke="#ef4444"/>
    <text class="legend" x="240" y="474">被审提交中的 finding</text>
  </g>

  <g data-graph-role="decoration">
    <rect x="40" y="550" width="1120" height="140" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text class="finding-title" x="62" y="585">后续复核</text>
    <text class="card-note" x="62" y="622">审计时发现 3 项真实问题；F001 / F002 后续由 df0c970 修复，F003 在最新 main 仍可复现。</text>
    <text class="card-note" x="62" y="652">本图是非评分说明；完整 evidence、finding 与风险评分以下方审计报告为准。</text>
  </g>
</svg>
